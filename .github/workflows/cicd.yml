on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.3.2

      - run: uvx ruff format --check .
      - run: uvx ruff check .
      - run: uvx ty check .
      - run: uv run --python 3.13 python -m unittest discover -s sns-discord -v

      - run: zip -j lambda.zip sns-discord/lambda_function.py
      - uses: actions/upload-artifact@v6
        with:
          name: build
          path: lambda.zip

  fmt-prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: creyD/prettier_action@v4.3
        with:
          dry: true
          prettier_options: --check **/*.{md,yaml,yml}

  deploy:
    if: |
      github.repository_owner == 'femiwiki' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    needs:
      - test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        region:
          - us-east-1
          - ap-northeast-1
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ matrix.region }}

      - name: Ensure runtime and handler
        run: |
          aws lambda update-function-configuration \
            --function-name DiscordNoti \
            --runtime python3.13 \
            --handler lambda_function.lambda_handler \
            --region "${{ matrix.region }}"
          aws lambda wait function-updated \
            --function-name DiscordNoti \
            --region "${{ matrix.region }}"

      - run: |
          aws lambda update-function-code \
            --function-name DiscordNoti \
            --zip-file fileb://lambda.zip \
            --region "${{ matrix.region }}" \
            --publish
